name: Manual LLM Check

on:
  workflow_dispatch:
    inputs:
      llm_provider:
        description: "LLM provider: openai, gemini, or ollama"
        required: true
        default: "openai"
        type: choice
        options:
          - openai
          - gemini
          - ollama
      llm_model:
        description: "Model name. Recommended OpenAI default: gpt-5-nano"
        required: false
        default: "gpt-5-nano"
      validation_suite:
        description: "Validation suite to run instead of a single task"
        required: false
        default: "none"
        type: choice
        options:
          - none
          - aavs
      task:
        description: "Natural language task to send to the selected LLM"
        required: false
        default: "연결 테스트입니다. 최종 응답으로 CONNECTION_OK 라고만 답해줘."

jobs:
  manual-llm-check:
    name: Manual LLM connection check
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure selected provider
        env:
          INPUT_LLM_PROVIDER: ${{ inputs.llm_provider }}
          INPUT_LLM_MODEL: ${{ inputs.llm_model }}
        run: |
          provider="$INPUT_LLM_PROVIDER"
          model="$INPUT_LLM_MODEL"
          if [ "$provider" = "ollama" ] && { [ -z "$model" ] || [ "$model" = "gpt-5-nano" ]; }; then
            model="qwen3.5:2b"
          fi
          if [ "$provider" = "gemini" ] && { [ -z "$model" ] || [ "$model" = "gpt-5-nano" ]; }; then
            model="gemini-2.5-flash-lite"
          fi
          if [ "$provider" = "openai" ] && [ -z "$model" ]; then
            model="gpt-5-nano"
          fi
          {
            echo "ADAPTIVE_AGENT_LLM=$provider"
            echo "EFFECTIVE_LLM_MODEL=$model"
            if [ "$provider" = "openai" ]; then
              echo "OPENAI_MODEL=$model"
            fi
            if [ "$provider" = "gemini" ]; then
              echo "GEMINI_MODEL=$model"
            fi
            if [ "$provider" = "ollama" ]; then
              echo "OLLAMA_MODEL=$model"
            fi
          } >> "$GITHUB_ENV"

      - name: Start Ollama when selected
        if: ${{ inputs.llm_provider == 'ollama' }}
        env:
          INPUT_LLM_MODEL: ${{ inputs.llm_model }}
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > ollama.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:11434/api/tags >/dev/null; then
              break
            fi
            sleep 2
          done
          model="${EFFECTIVE_LLM_MODEL:-$INPUT_LLM_MODEL}"
          if [ -z "$model" ] || [ "$model" = "gpt-5-nano" ]; then
            model="qwen3.5:2b"
          fi
          ollama pull "$model"
          echo "OLLAMA_MODEL=$model" >> "$GITHUB_ENV"

      - name: Validate cloud secrets
        env:
          INPUT_LLM_PROVIDER: ${{ inputs.llm_provider }}
        run: |
          if [ "$INPUT_LLM_PROVIDER" = "openai" ] && [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY repository secret is not set."
            exit 1
          fi
          if [ "$INPUT_LLM_PROVIDER" = "gemini" ] && [ -z "$GEMINI_API_KEY$GOOGLE_API_KEY" ]; then
            echo "GEMINI_API_KEY or GOOGLE_API_KEY repository secret is not set."
            exit 1
          fi

      - name: Run AAVS validation suite
        if: ${{ inputs.validation_suite == 'aavs' }}
        env:
          INPUT_LLM_PROVIDER: ${{ inputs.llm_provider }}
          INPUT_LLM_MODEL: ${{ inputs.llm_model }}
        run: |
          set -o pipefail
          output_dir="aavs-results-${INPUT_LLM_PROVIDER}"
          mkdir -p "$output_dir"
          timeout_args=()
          if [ -n "${AAVS_TIMEOUT_SECONDS:-}" ]; then
            timeout_args=(--timeout-seconds "$AAVS_TIMEOUT_SECONDS")
          fi
          python scripts/aavs_validate.py \
            --provider "$INPUT_LLM_PROVIDER" \
            --model "${EFFECTIVE_LLM_MODEL:-$INPUT_LLM_MODEL}" \
            "${timeout_args[@]}" \
            --output "$output_dir/records.json" \
            --markdown-output "$output_dir/records.md" \
            --scenario AAVS-001 \
            --scenario AAVS-003A \
            --scenario AAVS-003B \
            --scenario AAVS-006 | tee aavs-validation.log
          {
            echo "## AAVS Validation"
            echo ""
            echo "- Provider: \`$INPUT_LLM_PROVIDER\`"
            echo "- Requested model: \`${INPUT_LLM_MODEL:-default}\`"
            echo "- Effective model: \`${EFFECTIVE_LLM_MODEL:-default}\`"
            echo "- Output directory: \`$output_dir\`"
            echo ""
            echo "\`\`\`"
            cat aavs-validation.log
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload AAVS validation artifacts
        if: ${{ inputs.validation_suite == 'aavs' }}
        uses: actions/upload-artifact@v4
        with:
          name: aavs-results-${{ inputs.llm_provider }}
          path: aavs-results-${{ inputs.llm_provider }}/

      - name: Run LLM task
        if: ${{ inputs.validation_suite == 'none' }}
        env:
          INPUT_LLM_PROVIDER: ${{ inputs.llm_provider }}
          INPUT_LLM_MODEL: ${{ inputs.llm_model }}
          INPUT_TASK: ${{ inputs.task }}
        run: |
          set -o pipefail
          {
            echo "## Manual LLM Check"
            echo ""
            echo "- Provider: \`$INPUT_LLM_PROVIDER\`"
            echo "- Requested model: \`${INPUT_LLM_MODEL:-default}\`"
            echo "- Effective OpenAI model: \`${OPENAI_MODEL:-n/a}\`"
            echo "- Effective Gemini model: \`${GEMINI_MODEL:-n/a}\`"
            echo "- Effective Ollama model: \`${OLLAMA_MODEL:-n/a}\`"
            echo "- Task: \`$INPUT_TASK\`"
            echo ""
            echo "\`\`\`json"
          } >> "$GITHUB_STEP_SUMMARY"
          python -m adaptive_agent --json "$INPUT_TASK" | tee result.json | tee -a "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          python - <<'PY'
          import json
          import sys

          with open("result.json", encoding="utf-8") as handle:
              result = json.load(handle)
          if result.get("action") == "llm_error":
              print(result.get("output", "LLM check failed"))
              sys.exit(1)
          PY
